; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Fix WiFi UDP ENOMEM (error 12) by increasing TX/RX buffer counts
build_flags = 
    -DCONFIG_ESP32_WIFI_DYNAMIC_TX_BUFFER_NUM=64
    -DCONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM=16
    -DCONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM=64
    -DCONFIG_LWIP_MAX_ACTIVE_UDP_PCBS=16

board_microros_transport = wifi
board_microros_distro = humble

lib_deps = 
	adafruit/Adafruit PWM Servo Driver Library@^3.0.1
	https://github.com/micro-ROS/micro_ros_platformio
    marian-craciunescu/ESP32Ping @ ^1.7
	; adafruit/Adafruit MPU6050@^2.2.6
	; adafruit/Adafruit Unified Sensor@^1.1.14